<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <title>Movie DB</title>
  <style>
    html { background: #e0f1f1; }
    body { font-family: sans-serif; max-width: 900px; margin: 0 auto; padding: 0 20px; background: #e0f1f1; }
    #siteHeader { background: #5188b1; margin: 0 -20px 32px; padding: 20px 20px; }
    h1 { font-size: 1.4rem; margin: 0; color: #fff; }
    h2 { color: #5188b1; }
    form { display: flex; flex-wrap: wrap; gap: 10px; margin-bottom: 30px; }
    input, select {
      padding: 6px 10px; font-size: 0.9rem;
      background: rgba(255,255,255,0.65);
      border: 1px solid rgba(81,136,177,0.5);
      border-radius: 4px;
    }
    button {
      padding: 6px 16px; cursor: pointer;
      background: #5188b1; border: none; border-radius: 4px; color: #fff;
    }
    button:hover { background: #aed265; color: #3a4e1a; }
    table { width: 100%; border-collapse: collapse; font-size: 0.9rem; }
    th, td { border: 1px solid rgba(81,136,177,0.3); padding: 8px 12px; text-align: left; }
    th { background: #5188b1; color: #fff; }
    .null { color: #bbb; }
    th.sortable { cursor: pointer; user-select: none; }
    th.sortable:hover { background: #aed265; color: #3a4e1a; }
    th.sort-asc::after { content: ' ▲'; font-size: 0.75rem; }
    th.sort-desc::after { content: ' ▼'; font-size: 0.75rem; }
    #filterBar { margin-bottom: 12px; display: flex; align-items: flex-start; flex-wrap: wrap; gap: 10px; font-size: 0.9rem; }
    #genreFilterGroup { display: flex; flex-wrap: wrap; gap: 6px; }

    /* モーダル */
    #editModal {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(81,136,177,0.35);
      justify-content: center;
      align-items: center;
    }
    #editModalInner {
      background: #e0f1f1;
      padding: 30px;
      border-radius: 8px;
      border: 1px solid rgba(81,136,177,0.4);
      min-width: 300px;
      display: flex;
      flex-direction: column;
      gap: 12px;
    }
    #editModalInner h3 { margin: 0; font-size: 1rem; color: #5188b1; }
    #editModalInner label { font-size: 0.85rem; display: flex; flex-direction: column; gap: 4px; }
    #editModalInner input, #editModalInner select { padding: 6px 10px; font-size: 0.9rem; }
    .modalButtons { display: flex; gap: 10px; }
    .radioGroup, .checkboxGroup { display: flex; flex-wrap: wrap; gap: 8px; font-size: 0.85rem; }
    .radioGroup label, .checkboxGroup label { flex-direction: row; align-items: center; gap: 4px; }
    .fieldLabel { font-size: 0.85rem; margin-bottom: 2px; color: #5188b1; }
  </style>
</head>
<body>
  <div id="siteHeader">
    <h1>Movie DB</h1>
  </div>

  <h2>作品登録</h2>
  <form id="registerForm">
    <input type="text" id="title" placeholder="作品名" required>
    <input type="date" id="release_date" required>
    <input type="number" id="theater_count" placeholder="上映館数">
    <select id="has_bonus">
      <option value="">特典なし</option>
      <option value="true">特典あり</option>
    </select>
    <input type="number" id="bonus_count" placeholder="特典の弾数">
    <select id="distributor">
      <option value="">チャンネルを選択</option>
    </select>
    <input type="text" id="memo" placeholder="メモ">
    <button type="submit">登録</button>
  </form>

  <h2>作品一覧 <button id="reloadBtn" type="button">更新</button></h2>
  <div id="filterBar">
    <label>チャンネル名：
      <select id="distributorFilter">
        <option value="">すべて</option>
      </select>
    </label>
    <label>邦画 / 洋画：
      <select id="originFilter">
        <option value="">すべて</option>
        <option value="邦画">邦画</option>
        <option value="洋画">洋画</option>
      </select>
    </label>
    <label>実写 / アニメ：
      <select id="formatFilter">
        <option value="">すべて</option>
        <option value="実写">実写</option>
        <option value="アニメ">アニメ</option>
      </select>
    </label>
    <div>
      <div>ジャンル：</div>
      <div id="genreFilterGroup"></div>
    </div>
  </div>
  <table id="movieTable">
    <thead>
      <tr>
        <th class="sortable" data-field="title">作品名</th>
        <th class="sortable" data-field="release_date">公開日</th>
        <th class="sortable" data-field="theater_count">上映館数</th>
        <th class="sortable" data-field="youtube_views_release">予告再生数（公開当日）</th>
        <th>入場者特典</th>
        <th class="sortable" data-field="bonus_count">特典弾数</th>
        <th class="sortable" data-field="distributor">チャンネル名</th>
        <th>メモ</th>
        <th>動画形式</th>
        <th></th>
      </tr>
    </thead>
    <tbody id="movieList"></tbody>
  </table>

  <!-- 編集モーダル -->
  <div id="editModal">
    <div id="editModalInner">
      <h3 id="editTitle"></h3>
      <input type="hidden" id="editId">
      <form id="editForm">
        <label>上映館数
          <input type="number" id="editTheaterCount" placeholder="未入力">
        </label>
        <label>入場者特典
          <select id="editHasBonus">
            <option value="">なし</option>
            <option value="true">あり</option>
          </select>
        </label>
        <label>特典弾数
          <input type="number" id="editBonusCount" placeholder="未入力">
        </label>
        <label>チャンネル名
          <select id="editDistributor">
            <option value="">未選択</option>
          </select>
        </label>
        <label>メモ
          <input type="text" id="editMemo" placeholder="未入力">
        </label>
        <label>動画形式
          <select id="editVideoType">
            <option value="">未入力</option>
            <option value="short">short</option>
            <option value="regular">regular</option>
          </select>
        </label>
        <div>
          <div class="fieldLabel">邦画 / 洋画</div>
          <div class="radioGroup" id="editOriginGroup">
            <label><input type="radio" name="editOrigin" value="邦画"> 邦画</label>
            <label><input type="radio" name="editOrigin" value="洋画"> 洋画</label>
            <label><input type="radio" name="editOrigin" value=""> 未選択</label>
          </div>
        </div>
        <div>
          <div class="fieldLabel">実写 / アニメ</div>
          <div class="radioGroup" id="editFormatGroup">
            <label><input type="radio" name="editFormat" value="実写"> 実写</label>
            <label><input type="radio" name="editFormat" value="アニメ"> アニメ</label>
            <label><input type="radio" name="editFormat" value=""> 未選択</label>
          </div>
        </div>
        <div>
          <div class="fieldLabel">ジャンル</div>
          <div class="checkboxGroup" id="editGenresGroup"></div>
        </div>
        <div class="modalButtons">
          <button type="submit">保存</button>
          <button type="button" id="cancelEdit">キャンセル</button>
        </div>
      </form>
    </div>
  </div>

  <script src="app.js"></script>
</body>
</html>
